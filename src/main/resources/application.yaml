spring:
  application:
    name: track

  datasource:
    url: jdbc:postgresql://localhost:5432/trackorithm
    username: postgres
    # Prefer env vars in real setups: DB_PASSWORD, DB_USERNAME, etc.
    password: ${DB_PASSWORD:root1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migrations
    baseline-on-migrate: true
    baseline-version: 1

server:
  port: 8081

app:
  security:
    jwt:
      # Dev-only default. For production set JWT_SECRET to a long random value (>= 32 chars).
      secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
      issuer: ${JWT_ISSUER:trackorithm}
      access-token-ttl: ${JWT_ACCESS_TTL:PT2H}
